<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト提出</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="register-section">
            <h2>キャスト登録</h2>
            <p>シフト管理用の源氏名を入力してください。<br><span class="note">※この操作は初回のみです</span></p>
            <div class="form-group">
                <input type="text" id="genji-name-input" placeholder="例：ゆあ">
            </div>
            <button id="save-name-btn" class="primary-btn">登録してシフト入力へ</button>
        </div>

<div id="shift-section" style="display: none;">
    <h2>こんにちは、<span id="display-genji-name"></span>さん</h2>
    
    <div class="tab-container">
        <button id="tab-submit" class="tab-btn active">シフトを提出する</button>
        <button id="tab-view" class="tab-btn">提出済みシフトを見る</button>
    </div>

    <div id="sector-submit" class="tab-content">
        <h3 id="target-week-title">対象期間: --/-- 〜 --/--</h3>
        <div id="calendar-container"></div>
        <button id="submit-shift-btn">シフトを提出する</button>
    </div>

    <div id="sector-view" class="tab-content" style="display: none;">
        <h3>あなたの提出済みシフト</h3>
        <p style="font-size: 11px; color: #888; margin-bottom: 10px;">※今月〜来月末までの確定・提出済みシフトが表示されます</p>
        <div id="shift-list-container">
            <p style="text-align: center; color: #888;">読み込み中...</p>
        </div>
    </div>
</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
